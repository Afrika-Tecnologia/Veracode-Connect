name: 'Bantuu baseline flow'
description: 'Consulta baseline no Bantuu, roda Veracode Pipeline Scan com ou sem baseline, sobe baseline se necessario e publica resultados.'

inputs:
  bantuu_api_key:
    description: 'API Key usada no Bantuu.'
    required: true
  bantuu_base_url:
    description: 'URL base do Bantuu (sem barra final).'
    required: true
  repository_full_name:
    description: 'Repositorio org/repo usado nas chamadas ao Bantuu.'
    required: true
  veracode_api_id:
    description: 'ID da API do Veracode.'
    required: true
  veracode_api_key:
    description: 'Key da API do Veracode.'
    required: true
  scan_file:
    description: 'Arquivo compactado enviado ao Pipeline Scan (ex.: app.zip).'
    required: true
  policy_fail:
    description: 'Define se o scan deve quebrar o build por policy (true/false).'
    required: false
    default: 'false'
  fail_on_severity:
    description: 'Severidades que fazem o scan falhar quando ha baseline (ex.: "Very High, High").'
    required: false
  veracode_policy_name:
    description: 'Nome da policy a ser usada no scan do Veracode.'
    required: false
    default: ''

outputs:
  has_baseline:
    description: 'true/false indicando se o Bantuu possui baseline para o repositorio.'
    value: ${{ steps.check_baseline.outputs.has_baseline }}
  pipeline_status:
    description: 'Resumo do caminho seguido: com baseline ou sem baseline (com upload).'
    value: ${{ steps.pipeline_status_with_baseline.outputs.pipeline_status || steps.pipeline_status_without_baseline.outputs.pipeline_status }}

runs:
  using: 'composite'
  steps:
    - name: Instalar jq (se necessario)
      id: ensure_jq
      shell: bash
      run: |
        set -euo pipefail

        echo "::group::Instalar jq"
        if ! command -v jq >/dev/null 2>&1; then
          sudo apt-get update -y
          sudo apt-get install -y jq
        else
          echo "jq já instalado: $(jq --version)"
        fi
        echo "::endgroup::"

    - name: Consultar baseline no Bantuu
      id: check_baseline
      shell: bash
      env:
        BANTUU_API_KEY: ${{ inputs.bantuu_api_key }}
        BANTUU_BASE_URL: ${{ inputs.bantuu_base_url }}
        REPOSITORY_FULL_NAME: ${{ inputs.repository_full_name }}
      run: |
        set -euo pipefail

        echo "::group::Bantuu baseline (consulta)"
        RESPONSE_FILE="baseline-response.json"
        
        REPO_ENCODED=$(python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "${REPOSITORY_FULL_NAME}")

        HTTP_STATUS=$(curl -sS -w "%{http_code}" -o "${RESPONSE_FILE}" \
          --connect-timeout 30 \
          --max-time 120 \
          -H "X-API-Key: ${BANTUU_API_KEY}" \
          "${BANTUU_BASE_URL}/api/veracode/baseline?repositoryFullName=${REPO_ENCODED}")

        if [ "${HTTP_STATUS}" -ge 400 ]; then
          echo "::warning::Bantuu retornou HTTP ${HTTP_STATUS} ao consultar baseline. Continuando sem baseline."
          echo '{}' > "${RESPONSE_FILE}"
        fi

        if [ ! -s "${RESPONSE_FILE}" ]; then
          echo '{}' > "${RESPONSE_FILE}"
        fi

        HAS_BASELINE=$(jq -r '.hasBaseline // false' "${RESPONSE_FILE}")
        if [ "${HAS_BASELINE}" != "true" ]; then
          HAS_BASELINE="false"
        fi

        echo "has_baseline=${HAS_BASELINE}" >> "$GITHUB_OUTPUT"
        echo "has_baseline=${HAS_BASELINE}"
        echo "::endgroup::"

    - name: Criar arquivo de baseline local a partir do Bantuu
      id: create_local_baseline
      if: steps.check_baseline.outputs.has_baseline == 'true'
      shell: bash
      run: |
        set -euo pipefail
        jq '.results' baseline-response.json > baseline.json

    - name: Rodar Veracode Pipeline Scan com baseline
      id: pipeline_with_baseline
      if: steps.check_baseline.outputs.has_baseline == 'true'
      continue-on-error: true
      uses: veracode/Veracode-pipeline-scan-action@d7c19ef9f6584f1a729ce0a3ae106e5a6840548e # v1.0.20
      with:
        vid: ${{ inputs.veracode_api_id }}
        vkey: ${{ inputs.veracode_api_key }}
        file: ${{ inputs.scan_file }}
        baseline_file: 'baseline.json'
        fail_build: ${{ inputs.policy_fail }}
        fail_on_severity: ${{ inputs.fail_on_severity }}
        json_output: 'true'
        json_output_file: 'results.json'
        veracode_policy_name: ${{ inputs.veracode_policy_name }}

    - name: Enviar resultados do scan com baseline para o Bantuu
      id: upload_baseline_results
      if: steps.check_baseline.outputs.has_baseline == 'true'
      shell: bash
      env:
        BANTUU_API_KEY: ${{ inputs.bantuu_api_key }}
        BANTUU_BASE_URL: ${{ inputs.bantuu_base_url }}
        REPOSITORY_FULL_NAME: ${{ inputs.repository_full_name }}
      run: |
        set -euo pipefail

        echo "::group::Bantuu baseline (upload resultado com baseline)"
        if [ ! -f "results.json" ]; then
          echo "::warning::results.json não encontrado após o Pipeline Scan com baseline. Pulando upload."
          echo "::endgroup::"
          exit 0
        fi

        REPO_ENCODED=$(python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "${REPOSITORY_FULL_NAME}")

        HTTP_STATUS=$(curl -sS -w "%{http_code}" -o /tmp/bantuu-upload-response.txt \
          --connect-timeout 30 \
          --max-time 120 \
          -X POST "${BANTUU_BASE_URL}/api/veracode/baselineupload?repositoryFullName=${REPO_ENCODED}" \
          -H "Content-Type: application/json" \
          -H "X-API-Key: ${BANTUU_API_KEY}" \
          --data-binary @results.json)

        if [ "${HTTP_STATUS}" -ge 400 ]; then
          echo "::warning::Falha ao enviar resultados com baseline para o Bantuu (HTTP ${HTTP_STATUS}). O job continua."
        fi
        rm -f /tmp/bantuu-upload-response.txt
        echo "::endgroup::"

    - name: Rodar Veracode Pipeline Scan sem baseline
      id: pipeline_without_baseline
      if: steps.check_baseline.outputs.has_baseline == 'false'
      continue-on-error: true
      uses: veracode/Veracode-pipeline-scan-action@d7c19ef9f6584f1a729ce0a3ae106e5a6840548e # v1.0.20
      with:
        vid: ${{ inputs.veracode_api_id }}
        vkey: ${{ inputs.veracode_api_key }}
        file: ${{ inputs.scan_file }}
        fail_build: ${{ inputs.policy_fail }}
        json_output: 'true'
        json_output_file: 'results.json'
        veracode_policy_name: ${{ inputs.veracode_policy_name }}

    - name: Upload artefato Pipeline Scan
      if: steps.pipeline_with_baseline.outcome != 'skipped' || steps.pipeline_without_baseline.outcome != 'skipped'
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: pipescan-results
        path: |
          results.json
          filtered_results.json
        if-no-files-found: warn
        retention-days: 3

    - name: Enviar resultados para o Bantuu (novo baseline)
      id: upload_results
      if: steps.check_baseline.outputs.has_baseline == 'false'
      shell: bash
      env:
        BANTUU_API_KEY: ${{ inputs.bantuu_api_key }}
        BANTUU_BASE_URL: ${{ inputs.bantuu_base_url }}
        REPOSITORY_FULL_NAME: ${{ inputs.repository_full_name }}
      run: |
        set -euo pipefail

        echo "::group::Bantuu baseline (upload)"
        if [ ! -f "results.json" ]; then
          echo "::error::results.json não encontrado após o Pipeline Scan."
          echo "::endgroup::"
          exit 1
        fi

        jq -c --arg repo "${REPOSITORY_FULL_NAME}" \
          '. as $scan | {repositoryFullName: $repo, scanResult: $scan}' results.json > payload.json

        HTTP_STATUS=$(curl -sS -w "%{http_code}" -o /tmp/bantuu-upload-response.txt \
          --connect-timeout 30 \
          --max-time 120 \
          -X POST "${BANTUU_BASE_URL}/api/veracode/stock-issues/upload" \
          -H "Content-Type: application/json" \
          -H "X-API-Key: ${BANTUU_API_KEY}" \
          --data-binary @payload.json)

        if [ "${HTTP_STATUS}" -ge 400 ]; then
          echo "::error::Falha ao enviar baseline para Bantuu (HTTP ${HTTP_STATUS}). Verifique as credenciais."
          rm -f /tmp/bantuu-upload-response.txt payload.json
          echo "::endgroup::"
          exit 1
        fi
        rm -f /tmp/bantuu-upload-response.txt payload.json
        echo "::endgroup::"

    - name: Definir status (com baseline)
      id: pipeline_status_with_baseline
      if: steps.check_baseline.outputs.has_baseline == 'true'
      shell: bash
      env:
        OUTCOME: ${{ steps.pipeline_with_baseline.outcome }}
      run: |
        set -euo pipefail
        if [ "${OUTCOME}" = "failure" ]; then
          echo "pipeline_status=scan_failed_with_baseline" >> "$GITHUB_OUTPUT"
        else
          echo "pipeline_status=scan_completed_with_baseline" >> "$GITHUB_OUTPUT"
        fi

    - name: Definir status (sem baseline, baseline enviado)
      id: pipeline_status_without_baseline
      if: steps.check_baseline.outputs.has_baseline == 'false'
      shell: bash
      env:
        OUTCOME: ${{ steps.pipeline_without_baseline.outcome }}
      run: |
        set -euo pipefail
        if [ "${OUTCOME}" = "failure" ]; then
          echo "pipeline_status=scan_failed_without_baseline_and_uploaded" >> "$GITHUB_OUTPUT"
        else
          echo "pipeline_status=scan_completed_without_baseline_and_uploaded" >> "$GITHUB_OUTPUT"
        fi

    - name: Verificar resultado do Pipeline Scan (policy_fail)
      if: steps.pipeline_with_baseline.outcome != 'skipped' || steps.pipeline_without_baseline.outcome != 'skipped'
      shell: bash
      env:
        POLICY_FAIL: ${{ inputs.policy_fail }}
        WITH_BASELINE_OUTCOME: ${{ steps.pipeline_with_baseline.outcome }}
        WITHOUT_BASELINE_OUTCOME: ${{ steps.pipeline_without_baseline.outcome }}
      run: |
        set -euo pipefail

        echo "::group::Verificar resultado do Pipeline Scan (policy_fail)"
        if [ ! -f "results.json" ]; then
          echo "::error::results.json não encontrado após o Pipeline Scan."
          echo "::endgroup::"
          exit 1
        fi

        outcome="skipped"
        for o in "${WITH_BASELINE_OUTCOME}" "${WITHOUT_BASELINE_OUTCOME}"; do
          if [ -n "${o}" ] && [ "${o}" != "skipped" ] && [ "${o}" != "cancelled" ]; then
            outcome="${o}"
            break
          fi
        done

        if [ "${outcome}" = "failure" ]; then
          if [ "${POLICY_FAIL}" = "true" ]; then
            echo "::error::Pipeline Scan falhou e policy_fail=true."
            echo "::endgroup::"
            exit 1
          else
            echo "::warning::Pipeline Scan reportou falhas, mas policy_fail=false (o job continua)."
          fi
        fi
        echo "::endgroup::"

    - name: Gerar Summary do Baseline Pipeline Scan
      if: always() && (steps.pipeline_with_baseline.outcome != 'skipped' || steps.pipeline_without_baseline.outcome != 'skipped')
      shell: bash
      env:
        HAS_BASELINE: ${{ steps.check_baseline.outputs.has_baseline }}
        WITH_BASELINE_OUTCOME: ${{ steps.pipeline_with_baseline.outcome }}
        WITHOUT_BASELINE_OUTCOME: ${{ steps.pipeline_without_baseline.outcome }}
      run: |
        set -euo pipefail

        # Determinar outcome efetivo
        OUTCOME="skipped"
        for o in "${WITH_BASELINE_OUTCOME}" "${WITHOUT_BASELINE_OUTCOME}"; do
          if [ -n "${o}" ] && [ "${o}" != "skipped" ] && [ "${o}" != "cancelled" ]; then
            OUTCOME="${o}"
            break
          fi
        done

        {
          echo "### 🔬 Veracode Pipeline Scan (Bantuu Baseline)"
          echo ""

          if [ "${HAS_BASELINE}" = "true" ]; then
            echo "> 📁 Baseline encontrado no Bantuu — scan executado **com baseline**"
          else
            echo "> 🆕 Sem baseline no Bantuu — scan executado **sem baseline** (baseline enviado após scan)"
          fi
          echo ""

          if [ "${OUTCOME}" = "success" ]; then
            echo "> ✅ Pipeline Scan concluído com sucesso"
          elif [ "${OUTCOME}" = "failure" ]; then
            echo "> ❌ Pipeline Scan encontrou vulnerabilidades"
          else
            echo "> ⏭️ Pipeline Scan: ${OUTCOME}"
          fi
          echo ""

          if [ -f "results.json" ]; then
            TOTAL=$(jq '.findings | length' results.json 2>/dev/null || echo "0")
            VERY_HIGH=$(jq '[.findings[] | select(.severity == 5)] | length' results.json 2>/dev/null || echo "0")
            HIGH=$(jq '[.findings[] | select(.severity == 4)] | length' results.json 2>/dev/null || echo "0")
            MEDIUM=$(jq '[.findings[] | select(.severity == 3)] | length' results.json 2>/dev/null || echo "0")
            LOW=$(jq '[.findings[] | select(.severity <= 2)] | length' results.json 2>/dev/null || echo "0")

            echo "| Severidade | Quantidade |"
            echo "|---|---|"
            echo "| 🔴 Very High | ${VERY_HIGH} |"
            echo "| 🟠 High | ${HIGH} |"
            echo "| 🟡 Medium | ${MEDIUM} |"
            echo "| 🔵 Low / Very Low | ${LOW} |"
            echo "| **Total** | **${TOTAL}** |"
            echo ""

            # Mostrar tabela com filtragem se existe filtered_results.json
            if [ -f "filtered_results.json" ] && [ "${HAS_BASELINE}" = "true" ]; then
              FILTERED_TOTAL=$(jq '.findings | length' filtered_results.json 2>/dev/null || echo "0")
              if [ "${FILTERED_TOTAL}" != "0" ] && [ "${FILTERED_TOTAL}" != "null" ]; then
                echo "> 🆕 **${FILTERED_TOTAL}** vulnerabilidades novas (não presentes no baseline)"
                echo ""
              fi
            fi

            if [ "${TOTAL}" != "0" ] && [ "${TOTAL}" != "null" ]; then
              echo "<details><summary>📋 Detalhes das vulnerabilidades (${TOTAL})</summary>"
              echo ""
              echo "| # | Severidade | CWE | Título | Arquivo | Linha |"
              echo "|---|---|---|---|---|---|"

              jq -r '.findings | to_entries[] |
                def sev_icon:
                  if . == 5 then "🔴 Very High"
                  elif . == 4 then "🟠 High"
                  elif . == 3 then "🟡 Medium"
                  elif . == 2 then "🔵 Low"
                  elif . == 1 then "⚪ Very Low"
                  else "ℹ️ Info" end;
                "| \(.key + 1) | \(.value.severity | sev_icon) | CWE-\(.value.cwe_id) | \(.value.title // "N/A") | \(.value.files.source_file.file // "N/A") | \(.value.files.source_file.line // "N/A") |"' results.json 2>/dev/null || echo "| - | - | - | Erro ao parsear | - | - |"

              echo ""
              echo "</details>"
            fi
          else
            echo "> ⚠️ Arquivo results.json não encontrado."
          fi

          echo ""
        } >> "$GITHUB_STEP_SUMMARY"
