name: 'Build Gate'
description: 'Verificacao final de todos os steps. Trava o build se houver falhas e fail_build=true.'

inputs:
  fail_build:
    description: 'Se true, trava o build caso qualquer step tenha falhado (true/false).'
    required: false
    default: 'true'
  sca_status:
    description: 'Status do Veracode SCA.'
    required: false
    default: 'skipped'
  iac_outcome:
    description: 'Outcome do Veracode IaC/Secrets.'
    required: false
    default: 'skipped'
  baseline_outcome:
    description: 'Outcome do Bantuu Baseline Flow.'
    required: false
    default: 'skipped'
  pipeline_outcome:
    description: 'Outcome do Pipeline Scan.'
    required: false
    default: 'skipped'
  upload_outcome:
    description: 'Outcome do Upload & Scan.'
    required: false
    default: 'skipped'
  bu_status:
    description: 'Status do vínculo de Business Unit.'
    required: false
    default: 'skipped'

runs:
  using: 'composite'
  steps:
    - name: Trava de Build (verificacao final)
      shell: bash
      env:
        FAIL_BUILD: ${{ inputs.fail_build }}
        SCA_STATUS: ${{ inputs.sca_status }}
        IAC_OUTCOME: ${{ inputs.iac_outcome }}
        BASELINE_OUTCOME: ${{ inputs.baseline_outcome }}
        PIPELINE_OUTCOME: ${{ inputs.pipeline_outcome }}
        UPLOAD_OUTCOME: ${{ inputs.upload_outcome }}
        BU_STATUS: ${{ inputs.bu_status }}
      run: |
        set -euo pipefail

        echo "::group::Trava de Build (verificação final)"
        echo "============================================"
        echo "  RESUMO DOS RESULTADOS"
        echo "============================================"

        falhas=()
        alertas=()

        check_status() {
          local name="$1"
          local status="$2"
          if [[ "${status}" == "failure" || "${status}" == "failed" || "${status}" == "scan_failed"* ]]; then
            echo "  ❌ ${name}: ${status}"
            falhas+=("${name}")
          elif [ "${status}" = "skipped" ]; then
            echo "  ⏭️  ${name}: skipped"
          elif [ "${status}" = "warning" ]; then
            echo "  ⚠️  ${name}: warning"
            alertas+=("${name}")
          else
            echo "  ✅ ${name}: ${status}"
          fi
        }

        check_status "Veracode SCA" "${SCA_STATUS}"
        check_status "Veracode IaC/Secrets" "${IAC_OUTCOME}"
        check_status "Bantuu Baseline Flow" "${BASELINE_OUTCOME}"
        check_status "Pipeline Scan" "${PIPELINE_OUTCOME}"
        check_status "Upload & Scan" "${UPLOAD_OUTCOME}"
        check_status "Business Unit" "${BU_STATUS}"

        echo "============================================"

        if [ ${#alertas[@]} -gt 0 ]; then
          echo ""
          echo "::warning::Os seguintes steps geraram alertas: ${alertas[*]}"
        fi

        if [ ${#falhas[@]} -gt 0 ]; then
          echo ""
          echo "::error::Os seguintes steps falharam: ${falhas[*]}"
          echo ""

          if [ "${FAIL_BUILD}" = "true" ]; then
            echo "::error::fail_build=true — Travando a esteira."
            echo "::endgroup::"
            exit 1
          else
            echo "::warning::fail_build=false — Falhas detectadas, mas o build NÃO será travado."
          fi
        else
          echo ""
          echo "Processo de verificação concluído sem falhas."
        fi
        echo "::endgroup::"

    - name: Gerar Summary Final
      if: always()
      shell: bash
      env:
        FAIL_BUILD: ${{ inputs.fail_build }}
        SCA_STATUS: ${{ inputs.sca_status }}
        IAC_OUTCOME: ${{ inputs.iac_outcome }}
        BASELINE_OUTCOME: ${{ inputs.baseline_outcome }}
        PIPELINE_OUTCOME: ${{ inputs.pipeline_outcome }}
        UPLOAD_OUTCOME: ${{ inputs.upload_outcome }}
        BU_STATUS: ${{ inputs.bu_status }}
      run: |
        set -euo pipefail

        status_icon() {
          local status="$1"
          case "${status}" in
            success)       echo "✅ Success" ;;
            failure|failed|scan_failed*) echo "❌ Failed" ;;
            warning)       echo "⚠️ Warning" ;;
            skipped)       echo "⏭️ Skipped" ;;
            *)             echo "❓ ${status}" ;;
          esac
        }

        has_failure="false"
        for s in "${SCA_STATUS}" "${IAC_OUTCOME}" "${BASELINE_OUTCOME}" "${PIPELINE_OUTCOME}" "${UPLOAD_OUTCOME}"; do
          if [[ "${s}" == "failure" || "${s}" == "failed" || "${s}" == "scan_failed"* ]]; then
            has_failure="true"
            break
          fi
        done

        {
          echo "---"
          echo ""
          echo "## 🛡️ Veracode Connect — Resumo Final"
          echo ""

          if [ "${has_failure}" = "true" ]; then
            if [ "${FAIL_BUILD}" = "true" ]; then
              echo "> ❌ **Build travado** — Falhas detectadas e \`fail_build=true\`"
            else
              echo "> ⚠️ **Falhas detectadas** mas build **não travado** (\`fail_build=false\`)"
            fi
          else
            echo "> ✅ **Todos os checks passaram com sucesso**"
          fi
          echo ""

          echo "| Scan | Status |"
          echo "|---|---|"
          echo "| Veracode SCA | $(status_icon "${SCA_STATUS}") |"
          echo "| Veracode IaC/Secrets | $(status_icon "${IAC_OUTCOME}") |"
          echo "| Bantuu Baseline Flow | $(status_icon "${BASELINE_OUTCOME}") |"
          echo "| Pipeline Scan | $(status_icon "${PIPELINE_OUTCOME}") |"
          echo "| Upload & Scan | $(status_icon "${UPLOAD_OUTCOME}") |"
          echo "| Business Unit | $(status_icon "${BU_STATUS}") |"

          echo ""
          echo "---"
          echo ""
          echo "*Gerado por [Veracode Connect](https://github.com/Afrika-Tecnologia/Veracode-Connect)*"
        } >> "$GITHUB_STEP_SUMMARY"
