name: 'Veracode IaC / Secrets'
description: 'Roda o Veracode Container/IaC/Secrets scanning (directory scan), coleta resultados e publica como artefato.'

inputs:
  veracode_api_id:
    description: 'ID da API do Veracode (VID).'
    required: true
  veracode_api_key:
    description: 'Key da API do Veracode (VKEY).'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Veracode Container/IaC/Secrets scan (diretório)
      id: iac_scan
      uses: veracode/container_iac_secrets_scanning@6846f033a36fa3665b75b6c50f21d6f8b08d64b8 # v1.0.7
      with:
        vid: ${{ inputs.veracode_api_id }}
        vkey: ${{ inputs.veracode_api_key }}
        github-token: ${{ github.token }}
        command: scan
        type: directory
        source: .
        format: json
        fail_build: 'false'
        fail_build_on_error: 'false'

    - name: Definir status
      if: always()
      id: status
      shell: bash
      run: |
        set -euo pipefail
        if [ "${{ steps.iac_scan.outcome }}" = "success" ]; then
          echo "iac_status=success" >> "$GITHUB_OUTPUT"
        elif [ "${{ steps.iac_scan.outcome }}" = "failure" ]; then
          echo "iac_status=failure" >> "$GITHUB_OUTPUT"
        else
          echo "iac_status=skipped" >> "$GITHUB_OUTPUT"
        fi

    - name: Coletar arquivos de resultado do IaC
      if: always()
      shell: bash
      run: |
        set -euo pipefail

        echo "::group::Coletar resultados IaC/Secrets"
        mkdir -p iac-results

        # Lista de nomes de arquivos esperados
        files=(
          "results.json"
          "results.txt"
          "sbom_cyclonedx_xml.xml"
          "sbom_cyclonedx_json.json"
          "sbom_spdx_tag_value.json"
          "sbom_spdx_json.json"
          "sbom_github.json"
        )

        moved_any="false"

        # 1) Tentar mover do diretório atual
        for f in "${files[@]}"; do
          if [ -f "${f}" ]; then
            mv -f "${f}" "iac-results/${f}"
            moved_any="true"
          fi
        done

        # 2) Se não encontrou, buscar em subdiretórios comuns
        if [ "${moved_any}" != "true" ]; then
          echo "Arquivos não encontrados no diretório raiz. Buscando em subdiretórios..."
          for f in "${files[@]}"; do
            found=$(find "${GITHUB_WORKSPACE}" -maxdepth 3 -name "${f}" -not -path "*/iac-results/*" -not -path "*/node_modules/*" -print -quit 2>/dev/null || true)
            if [ -n "${found}" ]; then
              echo "Encontrado: ${found}"
              cp -f "${found}" "iac-results/${f}"
              moved_any="true"
            fi
          done
        fi

        if [ "${moved_any}" != "true" ]; then
          echo "::warning::Nenhum arquivo de resultado do IaC foi encontrado para coletar."
          echo "Listando arquivos .json no workspace (debug):"
          find "${GITHUB_WORKSPACE}" -maxdepth 3 -name '*.json' -not -path '*/node_modules/*' -not -path '*/.git/*' 2>/dev/null | head -20 || true
        else
          echo "Arquivos coletados em iac-results/:"
          ls -la iac-results || true
        fi
        echo "::endgroup::"

    - name: Upload artefato IaC
      if: always()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: iac-results
        path: |
          iac-results
        if-no-files-found: warn
        retention-days: 3

    - name: Gerar Summary do IaC
      if: always()
      shell: bash
      run: |
        set -euo pipefail

        {
          echo "### 🛡️ Veracode IaC / Secrets"
          echo ""

          if [ -f "iac-results/results.json" ]; then
            # Extrair findings — tenta várias estruturas conhecidas
            jq -e '
              if .matches then .matches
              elif type == "array" then .
              elif .findings then .findings
              elif .results then .results
              elif .vulnerabilities then .vulnerabilities
              else []
              end
            ' iac-results/results.json > /tmp/iac_findings.json 2>/dev/null || echo "[]" > /tmp/iac_findings.json

            TOTAL=$(jq 'length' /tmp/iac_findings.json 2>/dev/null || echo "0")

            # ── DEBUG: mostrar estrutura real do JSON para calibrar o parser ──
            echo "<details><summary>🔧 Debug: estrutura do JSON do IaC</summary>"
            echo ""
            echo "**Chaves raiz do results.json:**"
            echo '```json'
            jq 'if type == "object" then keys elif type == "array" then "array[\(length)]" else type end' iac-results/results.json 2>/dev/null || echo "erro"
            echo '```'
            echo ""
            echo "**Primeiro elemento do array de findings:**"
            echo '```json'
            jq '.[0]' /tmp/iac_findings.json 2>/dev/null || echo "vazio"
            echo '```'
            echo ""
            if [ "${TOTAL}" -gt 1 ] 2>/dev/null; then
              echo "**Segundo elemento (para comparar):**"
              echo '```json'
              jq '.[1]' /tmp/iac_findings.json 2>/dev/null || echo "vazio"
              echo '```'
              echo ""
            fi
            echo "</details>"
            echo ""
            # ── FIM DEBUG ──

            # Tentar extrair severidade de vários caminhos possíveis
            # Caminho 1: Grype (.vulnerability.severity)
            # Caminho 2: direto (.severity)
            # Caminho 3: outros (.risk_level, .Severity)
            SEV_EXPR='(
              .vulnerability.severity //
              .severity // .Severity // .SEVERITY //
              .risk_level // .risk //
              .finding_details.severity //
              (if .cvss_score then
                if .cvss_score >= 9 then "Critical"
                elif .cvss_score >= 7 then "High"
                elif .cvss_score >= 4 then "Medium"
                else "Low" end
              else null end) //
              "unknown"
            ) | tostring | ascii_downcase'

            CRITICAL=$(jq "[.[] | select((${SEV_EXPR}) | startswith(\"critical\"))] | length" /tmp/iac_findings.json 2>/dev/null || echo "0")
            HIGH=$(jq "[.[] | select((${SEV_EXPR}) == \"high\")] | length" /tmp/iac_findings.json 2>/dev/null || echo "0")
            MEDIUM=$(jq "[.[] | select((${SEV_EXPR}) | startswith(\"med\"))] | length" /tmp/iac_findings.json 2>/dev/null || echo "0")
            LOW=$(jq "[.[] | select((${SEV_EXPR}) | test(\"^(low|info|negligible)\"))] | length" /tmp/iac_findings.json 2>/dev/null || echo "0")

            echo "| Severidade | Quantidade |"
            echo "|---|---|"
            echo "| 🔴 Critical | ${CRITICAL} |"
            echo "| 🟠 High | ${HIGH} |"
            echo "| 🟡 Medium | ${MEDIUM} |"
            echo "| 🔵 Low | ${LOW} |"
            echo "| **Total Findings** | **${TOTAL}** |"
            echo ""

            if [ "${TOTAL}" != "0" ] && [ "${TOTAL}" != "null" ]; then
              echo "<details><summary>📋 Detalhes dos findings (${TOTAL})</summary>"
              echo ""
              echo "| # | Severidade | CVE / ID | Descrição | Biblioteca / Arquivo |"
              echo "|---|---|---|---|---|"

              jq -r '
                def get_sev:
                  (.vulnerability.severity // .severity // .Severity // .risk_level // "N/A") | tostring;

                def sev_icon:
                  (. | ascii_downcase) |
                  if startswith("critical") then "🔴"
                  elif . == "high" then "🟠"
                  elif startswith("med") then "🟡"
                  elif startswith("low") or startswith("info") or startswith("negligible") then "🔵"
                  else "⚪" end;

                def get_id:
                  (.vulnerability.id // .id // .cve // .rule_id // "N/A") | tostring;

                def get_desc:
                  (.vulnerability.description // .title // .description // .message // .vulnerability.id // .id // "N/A") | tostring | if length > 80 then .[:77] + "..." else . end;

                def get_target:
                  (.artifact.name // .file // .filename // .location // .path // "N/A") | tostring |
                  if . != "N/A" then
                    . + " " + ((.artifact.version // "") | tostring)
                  else . end;

                to_entries[] |
                "| \(.key + 1) | \(.value | get_sev | sev_icon) \(.value | get_sev) | \(.value | get_id) | \(.value | get_desc) | \(.value | get_target) |"
              ' /tmp/iac_findings.json 2>/dev/null || echo "| - | - | - | Erro ao parsear resultados | - |"

              echo ""
              echo "</details>"
            fi

          else
            echo "> ⚠️ Nenhum arquivo de resultado encontrado."
          fi

          echo ""
        } >> "$GITHUB_STEP_SUMMARY"
