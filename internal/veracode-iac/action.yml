name: 'Veracode IaC / Secrets'
description: 'Roda o Veracode Container/IaC/Secrets scanning (directory scan), coleta resultados e publica como artefato.'

inputs:
  veracode_api_id:
    description: 'ID da API do Veracode (VID).'
    required: true
  veracode_api_key:
    description: 'Key da API do Veracode (VKEY).'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Veracode Container/IaC/Secrets scan (diretório)
      id: iac_scan
      uses: veracode/container_iac_secrets_scanning@6846f033a36fa3665b75b6c50f21d6f8b08d64b8 # v1.0.7
      with:
        vid: ${{ inputs.veracode_api_id }}
        vkey: ${{ inputs.veracode_api_key }}
        github-token: ${{ github.token }}
        command: scan
        type: directory
        source: .
        format: table
        fail_build: 'false'
        fail_build_on_error: 'false'

    - name: Definir status
      if: always()
      id: status
      shell: bash
      run: |
        set -euo pipefail
        if [ "${{ steps.iac_scan.outcome }}" = "success" ]; then
          echo "iac_status=success" >> "$GITHUB_OUTPUT"
        elif [ "${{ steps.iac_scan.outcome }}" = "failure" ]; then
          echo "iac_status=failure" >> "$GITHUB_OUTPUT"
        else
          echo "iac_status=skipped" >> "$GITHUB_OUTPUT"
        fi

    - name: Coletar arquivos de resultado do IaC
      if: always()
      shell: bash
      run: |
        set -euo pipefail

        echo "::group::Coletar resultados IaC/Secrets"
        mkdir -p iac-results

        files=(
          "results.json"
          "results.txt"
          "sbom_cyclonedx_xml.xml"
          "sbom_cyclonedx_json.json"
          "sbom_spdx_tag_value.json"
          "sbom_spdx_json.json"
          "sbom_github.json"
        )

        moved_any="false"
        for f in "${files[@]}"; do
          if [ -f "${f}" ]; then
            mv -f "${f}" "iac-results/${f}"
            moved_any="true"
          fi
        done

        if [ "${moved_any}" != "true" ]; then
          echo "::warning::Nenhum arquivo de resultado do IaC foi encontrado para coletar."
        else
          echo "Arquivos coletados em iac-results/:"
          ls -la iac-results || true
        fi
        echo "::endgroup::"

    - name: Upload artefato IaC
      if: always()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: iac-results
        path: |
          iac-results
        if-no-files-found: warn
        retention-days: 3

    - name: Gerar Summary do IaC
      if: always()
      shell: bash
      run: |
        set -euo pipefail

        {
          echo "### 🛡️ Veracode IaC / Secrets"
          echo ""

          if [ -f "iac-results/results.json" ]; then
            # Detectar estrutura do JSON e extrair array de findings
            jq -e '
              if type == "array" then .
              elif .findings then .findings
              elif .results then .results
              elif .vulnerabilities then .vulnerabilities
              else []
              end
            ' iac-results/results.json > /tmp/iac_findings.json 2>/dev/null || echo "[]" > /tmp/iac_findings.json

            TOTAL=$(jq 'length' /tmp/iac_findings.json 2>/dev/null || echo "0")

            # Contar por severidade (case-insensitive, tenta vários campos)
            CRITICAL=$(jq '[.[] | select((.severity // .Severity // .risk_level // .risk // "" | ascii_downcase) | startswith("critical") or . == "very high")] | length' /tmp/iac_findings.json 2>/dev/null || echo "0")
            HIGH=$(jq '[.[] | select((.severity // .Severity // .risk_level // .risk // "" | ascii_downcase) == "high")] | length' /tmp/iac_findings.json 2>/dev/null || echo "0")
            MEDIUM=$(jq '[.[] | select((.severity // .Severity // .risk_level // .risk // "" | ascii_downcase) | startswith("med"))] | length' /tmp/iac_findings.json 2>/dev/null || echo "0")
            LOW=$(jq '[.[] | select((.severity // .Severity // .risk_level // .risk // "" | ascii_downcase) | startswith("low"))] | length' /tmp/iac_findings.json 2>/dev/null || echo "0")

            echo "| Severidade | Quantidade |"
            echo "|---|---|"
            echo "| 🔴 Critical | ${CRITICAL} |"
            echo "| 🟠 High | ${HIGH} |"
            echo "| 🟡 Medium | ${MEDIUM} |"
            echo "| 🔵 Low | ${LOW} |"
            echo "| **Total Findings** | **${TOTAL}** |"
            echo ""

            if [ "${TOTAL}" != "0" ] && [ "${TOTAL}" != "null" ]; then
              echo "<details><summary>📋 Detalhes dos findings (${TOTAL})</summary>"
              echo ""
              echo "| # | Severidade | Tipo | Descrição | Arquivo |"
              echo "|---|---|---|---|---|"

              jq -r '
                def severity_icon:
                  if . == "CRITICAL" or . == "critical" or . == "Very High" then "🔴"
                  elif . == "HIGH" or . == "high" or . == "High" then "🟠"
                  elif . == "MEDIUM" or . == "medium" or . == "Medium" then "🟡"
                  elif . == "LOW" or . == "low" or . == "Low" then "🔵"
                  else "⚪" end;

                to_entries[] |
                "| \(.key + 1) | \(.value.severity // .value.Severity // .value.risk_level // .value.risk // "N/A" | severity_icon) \(.value.severity // .value.Severity // .value.risk_level // .value.risk // "N/A") | \(.value.type // .value.category // .value.finding_type // "N/A") | \(.value.title // .value.description // .value.message // .value.rule_id // "N/A") | \(.value.file // .value.filename // .value.source_file // (.value.files.source_file.file) // "N/A") |"
              ' /tmp/iac_findings.json 2>/dev/null || echo "| - | - | - | Erro ao parsear resultados | - |"

              echo ""
              echo "</details>"
            fi

          else
            echo "> ⚠️ Nenhum arquivo de resultado encontrado."
          fi

          echo ""
        } >> "$GITHUB_STEP_SUMMARY"
