name: 'Veracode IaC / Secrets'
description: 'Roda o Veracode Container/IaC/Secrets scanning (directory scan), coleta resultados e publica como artefato.'

inputs:
  veracode_api_id:
    description: 'ID da API do Veracode (VID).'
    required: true
  veracode_api_key:
    description: 'Key da API do Veracode (VKEY).'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Veracode Container/IaC/Secrets scan (diretório)
      id: iac_scan
      uses: veracode/container_iac_secrets_scanning@6846f033a36fa3665b75b6c50f21d6f8b08d64b8 # v1.0.7
      with:
        vid: ${{ inputs.veracode_api_id }}
        vkey: ${{ inputs.veracode_api_key }}
        github-token: ${{ github.token }}
        command: scan
        type: directory
        source: .
        format: json
        fail_build: 'false'
        fail_build_on_error: 'false'

    - name: Definir status
      if: always()
      id: status
      shell: bash
      run: |
        set -euo pipefail
        if [ "${{ steps.iac_scan.outcome }}" = "success" ]; then
          echo "iac_status=success" >> "$GITHUB_OUTPUT"
        elif [ "${{ steps.iac_scan.outcome }}" = "failure" ]; then
          echo "iac_status=failure" >> "$GITHUB_OUTPUT"
        else
          echo "iac_status=skipped" >> "$GITHUB_OUTPUT"
        fi

    - name: Coletar arquivos de resultado do IaC
      if: always()
      shell: bash
      run: |
        set -euo pipefail

        echo "::group::Coletar resultados IaC/Secrets"
        mkdir -p iac-results

        # Lista de nomes de arquivos esperados
        files=(
          "results.json"
          "results.txt"
          "sbom_cyclonedx_xml.xml"
          "sbom_cyclonedx_json.json"
          "sbom_spdx_tag_value.json"
          "sbom_spdx_json.json"
          "sbom_github.json"
        )

        moved_any="false"

        # 1) Tentar mover do diretório atual
        for f in "${files[@]}"; do
          if [ -f "${f}" ]; then
            mv -f "${f}" "iac-results/${f}"
            moved_any="true"
          fi
        done

        # 2) Se não encontrou, buscar em subdiretórios comuns
        if [ "${moved_any}" != "true" ]; then
          echo "Arquivos não encontrados no diretório raiz. Buscando em subdiretórios..."
          for f in "${files[@]}"; do
            found=$(find "${GITHUB_WORKSPACE}" -maxdepth 3 -name "${f}" -not -path "*/iac-results/*" -not -path "*/node_modules/*" -print -quit 2>/dev/null || true)
            if [ -n "${found}" ]; then
              echo "Encontrado: ${found}"
              cp -f "${found}" "iac-results/${f}"
              moved_any="true"
            fi
          done
        fi

        if [ "${moved_any}" != "true" ]; then
          echo "::warning::Nenhum arquivo de resultado do IaC foi encontrado para coletar."
          echo "Listando arquivos .json no workspace (debug):"
          find "${GITHUB_WORKSPACE}" -maxdepth 3 -name '*.json' -not -path '*/node_modules/*' -not -path '*/.git/*' 2>/dev/null | head -20 || true
        else
          echo "Arquivos coletados em iac-results/:"
          ls -la iac-results || true
        fi
        echo "::endgroup::"

    - name: Upload artefato IaC
      if: always()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: iac-results
        path: |
          iac-results
        if-no-files-found: warn
        retention-days: 3

    - name: Gerar Summary do IaC
      if: always()
      shell: bash
      run: |
        set -euo pipefail

        {
          echo "### 🛡️ Veracode IaC / Secrets"
          echo ""

          if [ -f "iac-results/results.json" ]; then
            # Normalizar: extrair todos os findings de qualquer estrutura possível
            # O Veracode IaC pode retornar diversas estruturas:
            #   - Array raiz: [...]
            #   - Objeto com .findings, .results, .vulnerabilities
            #   - Objeto aninhado com .results.findings, .scan.findings, etc.
            #   - Múltiplas categorias: .vulnerabilities + .violations + .iac + .secrets
            jq -e '
              def collect:
                if type == "array" then .
                elif type == "object" then
                  [ (.findings // [])[], (.results // [])[], (.vulnerabilities // [])[], 
                    (.violations // [])[], (.iac // [])[], (.secrets // [])[] ] |
                  if length > 0 then .
                  else
                    # Tentar um nível mais fundo
                    [ to_entries[] | .value | 
                      if type == "array" then .[]
                      elif type == "object" then
                        ((.findings // [])[], (.results // [])[], (.vulnerabilities // [])[], (.violations // [])[])
                      else empty
                      end
                    ]
                  end
                else []
                end;
              collect
            ' iac-results/results.json > /tmp/iac_findings.json 2>/dev/null || echo "[]" > /tmp/iac_findings.json

            TOTAL=$(jq 'length' /tmp/iac_findings.json 2>/dev/null || echo "0")

            # Extrair severidade de forma genérica (tenta todos os campos possíveis, recursivamente)
            get_sev='(
              .severity // .Severity // .SEVERITY //
              .risk_level // .risk // .Risk //
              .finding_details.severity // .finding_details.Severity //
              .cvss_score // .score //
              "unknown"
            )'

            CRITICAL=$(jq --arg gs "$get_sev" '[.[] | ('"$get_sev"' | if type == "number" then (if . >= 9 then "critical" else "" end) else (tostring | ascii_downcase) end) | select(startswith("critical") or . == "very high")] | length' /tmp/iac_findings.json 2>/dev/null || echo "0")
            HIGH=$(jq '[.[] | ('"$get_sev"' | if type == "number" then (if . >= 7 and . < 9 then "high" else "" end) else (tostring | ascii_downcase) end) | select(. == "high")] | length' /tmp/iac_findings.json 2>/dev/null || echo "0")
            MEDIUM=$(jq '[.[] | ('"$get_sev"' | if type == "number" then (if . >= 4 and . < 7 then "medium" else "" end) else (tostring | ascii_downcase) end) | select(startswith("med"))] | length' /tmp/iac_findings.json 2>/dev/null || echo "0")
            LOW=$(jq '[.[] | ('"$get_sev"' | if type == "number" then (if . >= 0 and . < 4 then "low" else "" end) else (tostring | ascii_downcase) end) | select(startswith("low") or startswith("info"))] | length' /tmp/iac_findings.json 2>/dev/null || echo "0")

            echo "| Severidade | Quantidade |"
            echo "|---|---|"
            echo "| 🔴 Critical | ${CRITICAL} |"
            echo "| 🟠 High | ${HIGH} |"
            echo "| 🟡 Medium | ${MEDIUM} |"
            echo "| 🔵 Low | ${LOW} |"
            echo "| **Total Findings** | **${TOTAL}** |"
            echo ""

            if [ "${TOTAL}" != "0" ] && [ "${TOTAL}" != "null" ]; then
              echo "<details><summary>📋 Detalhes dos findings (${TOTAL})</summary>"
              echo ""
              echo "| # | Severidade | Tipo | Descrição | Arquivo |"
              echo "|---|---|---|---|---|"

              jq -r '
                def get_sev:
                  (.severity // .Severity // .SEVERITY // .risk_level // .risk // .Risk // .finding_details.severity // .finding_details.Severity // "N/A") | tostring;

                def severity_icon:
                  (if type == "number" then
                    if . >= 9 then "CRITICAL"
                    elif . >= 7 then "HIGH"
                    elif . >= 4 then "MEDIUM"
                    else "LOW" end
                  else tostring end) |
                  ascii_downcase |
                  if startswith("critical") or . == "very high" then "🔴"
                  elif . == "high" then "🟠"
                  elif startswith("med") then "🟡"
                  elif startswith("low") or startswith("info") then "🔵"
                  else "⚪" end;

                def get_type:
                  (.type // .category // .finding_type // .finding_details.finding_type // .finding_details.category // .rule_id // "N/A") | tostring;

                def get_desc:
                  (.title // .description // .message // .finding_details.title // .finding_details.description // .rule_id // .cwe_name // "N/A") | tostring | if length > 80 then .[:77] + "..." else . end;

                def get_file:
                  (.file // .filename // .source_file // .finding_details.file // .finding_details.filename // (.files.source_file.file) // .location // .path // "N/A") | tostring;

                to_entries[] |
                "| \(.key + 1) | \(.value | get_sev | severity_icon) \(.value | get_sev) | \(.value | get_type) | \(.value | get_desc) | \(.value | get_file) |"
              ' /tmp/iac_findings.json 2>/dev/null || echo "| - | - | - | Erro ao parsear resultados | - |"

              echo ""
              echo "</details>"
            fi

            # Debug: se severidades não bateram com total, mostrar estrutura
            COUNTED=$(( ${CRITICAL:-0} + ${HIGH:-0} + ${MEDIUM:-0} + ${LOW:-0} ))
            if [ "${TOTAL}" != "0" ] && [ "${COUNTED}" -eq 0 ] 2>/dev/null; then
              echo ""
              echo "<details><summary>🔧 Debug: estrutura do JSON (severidades não identificadas)</summary>"
              echo ""
              echo '```json'
              jq '.[0]' /tmp/iac_findings.json 2>/dev/null || jq '.' iac-results/results.json 2>/dev/null | head -50 || echo "Erro ao ler JSON"
              echo '```'
              echo ""
              echo "</details>"
            fi

          else
            echo "> ⚠️ Nenhum arquivo de resultado encontrado."
          fi

          echo ""
        } >> "$GITHUB_STEP_SUMMARY"
