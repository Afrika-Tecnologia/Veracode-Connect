name: 'Veracode SCA'
description: 'Roda o Veracode Software Composition Analysis (SCA) e publica os resultados como artefato.'

inputs:
  veracode_sca_token:
    description: 'Token de API do Veracode SCA (mapeado para SRCCLR_API_TOKEN).'
    required: true

outputs:
  sca_status:
    description: 'Resultado do SCA (success | warning).'
    value: ${{ steps.run_sca.outputs.sca_status }}

runs:
  using: 'composite'
  steps:
    - name: Rodar Veracode SCA
      id: run_sca
      shell: bash
      env:
        SRCCLR_API_TOKEN: ${{ inputs.veracode_sca_token }}
      run: |
        set -euo pipefail

        echo "::group::Veracode SCA"
        set +e
        curl -fsSL --connect-timeout 30 --max-time 120 --retry 3 --retry-delay 5 https://sca-downloads.veracode.com/ci.sh > ci.sh
        CURL_EXIT="${PIPESTATUS[0]}"

        if [ "${CURL_EXIT}" -ne 0 ]; then
          echo "::error::Falha ao baixar o script SCA do Veracode (curl exit ${CURL_EXIT})."
          exit 1
        fi

        # Verificação simples de tamanho (script não pode ser vazio/muito pequeno)
        if [ ! -s ci.sh ] || [ $(wc -c < ci.sh) -lt 1000 ]; then
          echo "::error::Script ci.sh baixado é inválido ou muito pequeno."
          exit 1
        fi

        bash ci.sh -- scan --allow-dirty 2>&1 | tee veracode_sca.log
        bash_exit="${PIPESTATUS[0]}"
        set -e
        echo "::endgroup::"

        if [ "${bash_exit}" -ne 0 ]; then
          echo "::warning::Veracode SCA retornou exit code ${bash_exit} (o job continua)."
          echo "sca_status=warning" >> "$GITHUB_OUTPUT"
        else
          echo "sca_status=success" >> "$GITHUB_OUTPUT"
        fi

    - name: Upload artefato SCA
      if: always()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: sca-results
        path: |
          veracode_sca.log
        if-no-files-found: warn
        retention-days: 3

    - name: Gerar Summary do SCA
      if: always()
      shell: bash
      env:
        SCA_STATUS: ${{ steps.run_sca.outputs.sca_status }}
      run: |
        set -euo pipefail

        {
          echo "### 🔍 Veracode SCA (Software Composition Analysis)"
          echo ""

          if [ -f "veracode_sca.log" ]; then
            # Extrair métricas do log do SCA (formato tabular com espaços)
            VULN_CRITICAL=$(grep -oiP 'Critical\s+Risk\s+Vulnerabilities\s+\K\d+' veracode_sca.log 2>/dev/null | head -1 || echo "0")
            VULN_HIGH=$(grep -oiP 'High\s+Risk\s+Vulnerabilities\s+\K\d+' veracode_sca.log 2>/dev/null | head -1 || echo "0")
            VULN_MEDIUM=$(grep -oiP 'Medium\s+Risk\s+Vulnerabilities\s+\K\d+' veracode_sca.log 2>/dev/null | head -1 || echo "0")
            VULN_LOW=$(grep -oiP 'Low\s+Risk\s+Vulnerabilities\s+\K\d+' veracode_sca.log 2>/dev/null | head -1 || echo "0")
            VULN_TOTAL=$(( ${VULN_CRITICAL:-0} + ${VULN_HIGH:-0} + ${VULN_MEDIUM:-0} + ${VULN_LOW:-0} ))
            LIB_TOTAL=$(grep -oiP 'Total\s+Libraries\s+\K\d+' veracode_sca.log 2>/dev/null | head -1 || echo "0")
            DIRECT_LIBS=$(grep -oiP 'Direct\s+Libraries\s+\K\d+' veracode_sca.log 2>/dev/null | head -1 || echo "0")
            VULN_LIBS=$(grep -oiP 'Vulnerable\s+Libraries\s+\K\d+' veracode_sca.log 2>/dev/null | head -1 || echo "0")

            echo "| Severidade | Quantidade |"
            echo "|---|---|"
            echo "| 🔴 Critical Risk | ${VULN_CRITICAL} |"
            echo "| 🟠 High Risk | ${VULN_HIGH} |"
            echo "| 🟡 Medium Risk | ${VULN_MEDIUM} |"
            echo "| 🔵 Low Risk | ${VULN_LOW} |"
            echo "| **Total Vulnerabilidades** | **${VULN_TOTAL}** |"
            echo "| Bibliotecas vulneráveis | ${VULN_LIBS} |"
            echo "| Total de bibliotecas analisadas | ${LIB_TOTAL} |"
            echo "| Bibliotecas diretas | ${DIRECT_LIBS} |"
            TRANSITIVE_LIBS=$(( ${LIB_TOTAL:-0} - ${DIRECT_LIBS:-0} ))
            echo "| Bibliotecas transitivas | ${TRANSITIVE_LIBS} |"
            echo ""

            # Detalhes das vulnerabilidades (linhas CVE-* e NO-CVE do log)
            VULN_LINES=$(grep -cP '^\s*(CVE-\S+|NO-CVE)\s+' veracode_sca.log 2>/dev/null || echo "0")
            if [ "${VULN_LINES}" -gt 0 ] 2>/dev/null; then
              echo "<details><summary>📋 Detalhes das vulnerabilidades (${VULN_LINES})</summary>"
              echo ""
              echo "| # | Severidade | CVE | Descrição | Biblioteca |"
              echo "|---|---|---|---|---|"

              grep -P '^\s*(CVE-\S+|NO-CVE)\s+' veracode_sca.log 2>/dev/null | awk -F'  +' '{
                gsub(/^[ \t]+/, "", $0);
                cve=$1; sev=$2; desc=$3; lib=$4;
                gsub(/^[ \t]+|[ \t]+$/, "", cve);
                gsub(/^[ \t]+|[ \t]+$/, "", sev);
                gsub(/^[ \t]+|[ \t]+$/, "", desc);
                gsub(/^[ \t]+|[ \t]+$/, "", lib);
                icon="⚪";
                if (sev ~ /Critical/) icon="🔴";
                else if (sev ~ /High/) icon="🟠";
                else if (sev ~ /Medium/) icon="🟡";
                else if (sev ~ /Low/) icon="🔵";
                printf "| %d | %s %s | %s | %s | %s |\n", NR, icon, sev, cve, desc, lib
              }' || true

              echo ""
              echo "</details>"
            fi
          else
            echo "> ⚠️ Log do SCA não encontrado."
          fi

          echo ""
        } >> "$GITHUB_STEP_SUMMARY"
