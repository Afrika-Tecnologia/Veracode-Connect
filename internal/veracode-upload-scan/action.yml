name: 'Veracode Upload & Scan'
description: 'Envia o artefato para o Veracode e inicia um Static Scan (Upload & Scan).'

inputs:
  veracode_api_id:
    description: 'ID da API do Veracode (VID).'
    required: true
  veracode_api_key:
    description: 'Key da API do Veracode (VKEY).'
    required: true
  repository_full_name:
    description: 'Repositório org/repo usado como appname no Veracode.'
    required: true
  veracode_sandbox:
    description: 'Define se o Upload & Scan deve usar sandbox (true) ou o app principal (false).'
    required: false
    default: 'false'
  filepath:
    description: 'Caminho do arquivo .zip a ser enviado para o Veracode (mesmo artefato do Pipeline Scan).'
    required: true
  veracode_appname:
    description: 'Nome do app no Veracode.'
    required: false
    default: '${{ github.repository }}'

runs:
  using: 'composite'
  steps:
    - name: Calcular nome do sandbox
      id: vars
      shell: bash
      env:
        ENABLE_SANDBOX: ${{ inputs.veracode_sandbox }}
        HEAD_REF: ${{ github.head_ref }}
        REF_NAME: ${{ github.ref_name }}
        APP_NAME: ${{ inputs.veracode_appname }}
      run: |
        set -euo pipefail

        echo "::group::Veracode Upload & Scan (preparação)"
        branch="${HEAD_REF:-$REF_NAME}"
        if [ -z "${branch}" ]; then
          branch="unknown"
        fi

        sandbox_name="${branch} - ${APP_NAME}"
        sandbox_name="$(printf '%s' "${sandbox_name}" | cut -c1-80)"

        if [ "${ENABLE_SANDBOX}" != "true" ]; then
          sandbox_name=""
        fi

        echo "sandbox_name=${sandbox_name}" >> "$GITHUB_OUTPUT"
        echo "::endgroup::"

    - name: Resolver filepath absoluto
      id: resolve_filepath
      shell: bash
      env:
        INPUT_FILEPATH: ${{ inputs.filepath }}
      run: |
        set -euo pipefail
        echo "::group::Resolver filepath absoluto"

        if [[ "${INPUT_FILEPATH}" = /* ]]; then
          ABS_PATH="${INPUT_FILEPATH}"
        else
          ABS_PATH="${GITHUB_WORKSPACE}/${INPUT_FILEPATH}"
        fi

        if [ ! -f "${ABS_PATH}" ]; then
          echo "::error::Arquivo não encontrado: ${ABS_PATH}"
          echo "::endgroup::"
          exit 1
        fi

        echo "filepath=${ABS_PATH}" >> "$GITHUB_OUTPUT"
        echo "Filepath resolvido: ${ABS_PATH}"
        echo "::endgroup::"

    - name: Veracode Upload & Scan
      id: upload_and_scan
      uses: veracode/veracode-uploadandscan-action@ddca86b1d1d45639d1c414003f3495f71851cfe2 # 0.2.11
      with:
        vid: ${{ inputs.veracode_api_id }}
        vkey: ${{ inputs.veracode_api_key }}
        appname: '${{ inputs.veracode_appname }}'
        createprofile: true
        filepath: ${{ steps.resolve_filepath.outputs.filepath }}
        version: 'Scan via Veracode Connect: ${{ github.server_url }}/${{ inputs.repository_full_name }} - ${{ github.run_id }}-${{ github.run_number }}-${{ github.run_attempt }}'
        createsandbox: ${{ inputs.veracode_sandbox }}
        sandboxname: ${{ steps.vars.outputs.sandbox_name }}
        deleteincompletescan: 2
        scanallnonfataltoplevelmodules: true

    - name: Gerar Summary do Upload & Scan
      if: always()
      shell: bash
      env:
        UPLOAD_OUTCOME: ${{ steps.upload_and_scan.outcome }}
        APP_NAME: ${{ inputs.veracode_appname }}
        SANDBOX_NAME: ${{ steps.vars.outputs.sandbox_name }}
        ENABLE_SANDBOX: ${{ inputs.veracode_sandbox }}
        FILEPATH: ${{ steps.resolve_filepath.outputs.filepath }}
      run: |
        set -euo pipefail

        {
          echo "### 📤 Veracode Upload & Scan"
          echo ""

          if [ "${UPLOAD_OUTCOME}" = "success" ]; then
            echo "> ✅ Upload & Scan enviado com sucesso"
          elif [ "${UPLOAD_OUTCOME}" = "failure" ]; then
            echo "> ❌ Upload & Scan falhou"
          else
            echo "> ⏭️ Upload & Scan: ${UPLOAD_OUTCOME}"
          fi
          echo ""

          FILE_NAME="N/A"
          FILE_SIZE="N/A"
          if [ -n "${FILEPATH:-}" ] && [ -f "${FILEPATH}" ]; then
            FILE_NAME=$(basename "${FILEPATH}")
            FILE_SIZE=$(du -h "${FILEPATH}" | cut -f1)
          fi

          echo "| Propriedade | Valor |"
          echo "|---|---|"
          echo "| App Name | \`${APP_NAME}\` |"
          if [ "${ENABLE_SANDBOX}" = "true" ]; then
            echo "| Sandbox | \`${SANDBOX_NAME}\` |"
          else
            echo "| Sandbox | Desativado (scan no app principal) |"
          fi
          echo "| Artefato | \`${FILE_NAME}\` |"
          echo "| Tamanho | ${FILE_SIZE} |"
          echo "| Status | ${UPLOAD_OUTCOME} |"

          echo ""
        } >> "$GITHUB_STEP_SUMMARY"