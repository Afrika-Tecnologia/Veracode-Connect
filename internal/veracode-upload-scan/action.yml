name: 'Veracode Upload & Scan'
description: 'Envia o artefato para o Veracode e inicia um Static Scan (Upload & Scan).'

inputs:
  veracode_api_id:
    description: 'ID da API do Veracode (VID).'
    required: true
  veracode_api_key:
    description: 'Key da API do Veracode (VKEY).'
    required: true
  repository_full_name:
    description: 'Repositório org/repo usado como appname no Veracode.'
    required: true
  veracode_sandbox:
    description: 'Define se o Upload & Scan deve usar sandbox (true) ou o app principal (false).'
    required: false
    default: 'false'
  filepath:
    description: 'Caminho do arquivo .zip a ser enviado para o Veracode (mesmo artefato do Pipeline Scan).'
    required: true
  veracode_appname:
    description: 'Nome do app no Veracode.'
    required: false
    default: '${{ github.repository }}'

runs:
  using: 'composite'
  steps:
    - name: Calcular nome do sandbox
      id: vars
      shell: bash
      env:
        ENABLE_SANDBOX: ${{ inputs.veracode_sandbox }}
        REPOSITORY_FULL_NAME: ${{ inputs.repository_full_name }}
        HEAD_REF: ${{ github.head_ref }}
        REF_NAME: ${{ github.ref_name }}
      run: |
        set -euo pipefail

        echo "::group::Veracode Upload & Scan (preparação)"
        branch="${HEAD_REF:-$REF_NAME}"
        if [ -z "${branch}" ]; then
          branch="unknown"
        fi

        sanitize() {
          printf '%s' "$1" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9._-]+/-/g; s/^-+|-+$//g; s/-+/-/g'
        }

        branch_s="$(sanitize "${branch}")"
        repo_s="$(sanitize "${REPOSITORY_FULL_NAME}")"

        sandbox_name="${branch_s}-${repo_s}"
        sandbox_name="$(printf '%s' "${sandbox_name}" | cut -c1-80)"

        if [ "${ENABLE_SANDBOX}" != "true" ]; then
          sandbox_name=""
        fi

        echo "sandbox_name=${sandbox_name}" >> "$GITHUB_OUTPUT"
        echo "::endgroup::"

    - name: Resolver filepath absoluto
      id: resolve_filepath
      shell: bash
      env:
        INPUT_FILEPATH: ${{ inputs.filepath }}
      run: |
        set -euo pipefail
        echo "::group::Resolver filepath absoluto"

        if [[ "${INPUT_FILEPATH}" = /* ]]; then
          ABS_PATH="${INPUT_FILEPATH}"
        else
          ABS_PATH="${GITHUB_WORKSPACE}/${INPUT_FILEPATH}"
        fi

        if [ ! -f "${ABS_PATH}" ]; then
          echo "::error::Arquivo não encontrado: ${ABS_PATH}"
          echo "::endgroup::"
          exit 1
        fi

        echo "filepath=${ABS_PATH}" >> "$GITHUB_OUTPUT"
        echo "Filepath resolvido: ${ABS_PATH}"
        echo "::endgroup::"

    - name: Veracode Upload & Scan
      id: upload_and_scan
      shell: bash
      env:
        VID: ${{ inputs.veracode_api_id }}
        VKEY: ${{ inputs.veracode_api_key }}
        APP_NAME: ${{ inputs.veracode_appname }}
        FILEPATH: ${{ steps.resolve_filepath.outputs.filepath }}
        BUILD_VERSION: 'Scan via Veracode Connect: ${{ github.server_url }}/${{ inputs.repository_full_name }} - ${{ github.run_id }}-${{ github.run_number }}-${{ github.run_attempt }}'
        CREATE_SANDBOX: ${{ inputs.veracode_sandbox }}
        SANDBOX_NAME: ${{ steps.vars.outputs.sandbox_name }}
      run: |
        set -euo pipefail
        echo "::group::Veracode Upload & Scan"

        echo "Arquivo a enviar: ${FILEPATH}"

        # Baixar o Veracode Java API Wrapper
        JAR_VERSION="26.2.18.0"
        JAR_NAME="vosp-api-wrappers-java-${JAR_VERSION}.jar"
        JAR_URL="https://repo1.maven.org/maven2/com/veracode/vosp/api/wrappers/vosp-api-wrappers-java/${JAR_VERSION}/${JAR_NAME}"
        echo "Baixando Veracode Java API Wrapper ${JAR_VERSION}..."
        curl -fsSL "${JAR_URL}" -o "${JAR_NAME}"

        echo "Enviando arquivo para o Veracode..."
        if [ "${CREATE_SANDBOX}" = "true" ] && [ -n "${SANDBOX_NAME}" ]; then
          java -jar "${JAR_NAME}" \
            -action UploadFile \
            -vid "${VID}" \
            -vkey "${VKEY}" \
            -appname "${APP_NAME}" \
            -version "${BUILD_VERSION}" \
            -filepath "${FILEPATH}" \
            -createprofile true \
            -deleteincompletescan true \
            -createsandbox true \
            -sandboxname "${SANDBOX_NAME}"

          echo "Iniciando pré-scan (autoscan ativado — sem aguardar resultado)..."
          java -jar "${JAR_NAME}" \
            -action BeginPrescan \
            -vid "${VID}" \
            -vkey "${VKEY}" \
            -appname "${APP_NAME}" \
            -sandboxname "${SANDBOX_NAME}" \
            -autoscan true
        else
          java -jar "${JAR_NAME}" \
            -action UploadFile \
            -vid "${VID}" \
            -vkey "${VKEY}" \
            -appname "${APP_NAME}" \
            -version "${BUILD_VERSION}" \
            -filepath "${FILEPATH}" \
            -createprofile true \
            -deleteincompletescan true

          echo "Iniciando pré-scan (autoscan ativado — sem aguardar resultado)..."
          java -jar "${JAR_NAME}" \
            -action BeginPrescan \
            -vid "${VID}" \
            -vkey "${VKEY}" \
            -appname "${APP_NAME}" \
            -autoscan true
        fi

        echo "✅ Scan enviado com sucesso. Resultado disponível no portal Veracode."
        echo "::endgroup::"